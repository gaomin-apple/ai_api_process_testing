server:
  address: 127.0.0.1
  port: ${SERVER_PORT:51780}
  error:
    include-message: always
spring:
  application:
    name: aft-studio
  datasource:
    url: jdbc:sqlite:${AFT_DATA_DIR:${user.home}/.aft-studio}/aft.db
    driver-class-name: org.sqlite.JDBC
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    serialization:
      write-dates-as-timestamps: false
aft:
  browser:
    open: ${AFT_OPEN_BROWSER:true}
